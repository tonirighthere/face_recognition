services:
  face_recognition:
    build:
      context: .
      dockerfile: Dockerfile
    image: face_recognition:latest
    container_name: face_recognition_api
    restart: unless-stopped

    environment:
      - PYTHONUNBUFFERED=1
      - API_PORT=8000

    volumes:
      # Persistent data: SQLite database
      - ./database:/app/database
      # Persistent data: face photos
      - ./storage:/app/storage
      # Persistent data: AI model weights
      - ./weights:/app/weights

    # Map cổng 8000 ra ngoài host để localtunnel/ngrok truy cập trực tiếp
    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: face_recognition_nginx
    restart: unless-stopped
    depends_on:
      - face_recognition
    ports:
      - "80:80"    # HTTP → redirect sang HTTPS
      - "443:443"  # HTTPS (camera, WebSocket)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
