services:
  face_recognition:
    build:
      context: .
      dockerfile: Dockerfile
    image: face_recognition:latest
    container_name: face_recognition_api
    restart: unless-stopped

    environment:
      - PYTHONUNBUFFERED=1
      - API_PORT=8000

    volumes:
      # Persistent data: SQLite database
      - ./database:/app/database
      # Persistent data: face photos
      - ./storage:/app/storage
      # Persistent data: AI model weights
      - ./weights:/app/weights

    ports:
      # FastAPI Web UI + REST API + WebSocket
      - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
